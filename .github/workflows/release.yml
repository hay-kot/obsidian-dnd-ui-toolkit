name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          
          # Check if this is a pre-release (contains hyphen in version)
          if [[ "$tag" == *"-"* ]]; then
            prerelease_flag="--prerelease"
          else
            prerelease_flag=""
          fi

          gh release create "$tag" \
            --title="$tag" \
            --draft=false \
            --notes-from-tag \
            $prerelease_flag \
            main.js manifest.json styles.css

  deploy-docs:
    needs: build
    if: ${{ !contains(github.ref_name, '-') }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-docs.yml
